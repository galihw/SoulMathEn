			body {
				font-family: Arial;

			.splitright {
				height: 100%;
				width: 70%;
				position: fixed;
				z-index: 1;
				top: 0;
				overflow-x: hidden;
				padding-top: 20px;
			}
			.split {
				height: 100%;
				width: 30%;
				position: fixed;
				z-index: 1;
				top: 0;
				overflow-x: hidden;
				padding-top: 20px;
			}

			}
			.right {
				right: 0;

				color: black;
			}
			.centered {
				position: absolute;
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
				text-align: center;
			}
			
			.top {
				position: absolute;
				top: 0%;
				left: 50%;
				transform: translate(-50%, -0%);
				text-align: center;
			}
			.topleft {
				position: absolute;

				left: 10px;
				text-align: left;
			}
			
			
			
			.expand-btn {
				background-color: #003049;
				border: none;
				color: #e3d5ca;
				cursor: pointer;
				font-size: 1rem;
				padding: 1rem;
				text-align: left;
				transition: 0.5s;
				width: 100px;
				height: 40px;
			}
			.expand-btnno {
				background-color: #003049;

				color: #e3d5ca;

				color: #003049;
			}
			.expand-btn:after {
				color: #e3d5ca;
				content: "+";
				float: right;
				font-weight: bold;
				transition: 0.1s;
			}
			.expand-btnno:after {
				color: #e3d5ca;
				content: "+";
				float: right;
				font-weight: bold;
				transition: 0.1s;
			}
			.expand-btn:hover:after {
				color: #003049;
				transition: 0.5s;
			}
			.expand-btnno:hover:after {
				color: #003049;
				transition: 0.5s;
			}
			.active:after {
				content: "-";
				color: #003049;
			}

				color: #e3d5ca;

			function RandomMyArray(Arr){
				/* ---- RANDOM isi Array ---- */
				/* Global */
				for (var i=0; i<Arr.length; i++){
					var r = Math.floor(Math.random() * Arr.length);
					var a = Arr[i];
					Arr[i] = Arr[r];
					Arr[r] = a;
				}
				return Arr
			}

				divPrint.style.align = "center";
				document.body.appendChild(divPrint);
				
				var buttonCetak = document.createElement('button');
				buttonCetak.innerHTML = "Cetak";
				buttonCetak.onclick = funcPrint;
				document.body.appendChild(buttonCetak);
				var buttonUlang = document.createElement('button');
				buttonUlang.innerHTML = "Ulang";
				buttonUlang.onclick = funcUlang;
				document.body.appendChild(buttonUlang);
				
				
				// cetak satu per satu soal
				for(var i=1;i<=ArrAmbil.length;i++){
					var wh = ArWH[i-1];
					var url = ArUrl[i-1];
					var inner = ArInner[i-1];
					var ddd1 = document.createElement('div');
					var ddd2 = document.createElement('div');
					var ddd3 = document.createElement('div');
					var ddd4 = document.createElement('div');
					ddd1.style.color = "#000000"
					ddd2.style.color = "#000000"
					ddd3.style.color = "#000000"
					ddd4.style.color = "#000000"
					ddd1.style.font = "16px arial";
					ddd2.style.font = "16px arial";
					ddd3.style.font = "16px arial";
					ddd4.style.font = "16px arial";
					
					
					var ccc1 = document.createElement('img');
					ccc1.width = wh[0];
					ccc1.height = wh[1];
					var ccc2 = document.createElement('img');
					ccc2.width = wh[2];
					ccc2.height = wh[3];
					var ccc3 = document.createElement('img');
					ccc3.width = wh[4];
					ccc3.height = wh[5];
					
					if(ccc1.height==0)	hidingElemen(ccc1);
					if(ccc2.height==0)	hidingElemen(ccc2);
					if(ccc3.height==0)	hidingElemen(ccc3);
					
					document.body.appendChild(ddd1);
					document.body.appendChild(ccc1);
					document.body.appendChild(ddd2);
					document.body.appendChild(ccc2);
					document.body.appendChild(ddd3);
					document.body.appendChild(ccc3);
					document.body.appendChild(ddd4);
					
					ddd1.innerHTML = inner[0];
					ccc1.src = url[0];
					ddd2.innerHTML = inner[1];
					ccc2.src = url[1];
					ddd3.innerHTML = inner[2];
					ccc3.src = url[2];
					ddd4.innerHTML = "";//inner[3];
					
					arJawab.push(inner[3][inner[3].length - 1]);
					
					if(inner[0]=="")	hidingElemen(ddd1);
					if(inner[1]=="")	hidingElemen(ddd2);
					if(inner[2]=="")	hidingElemen(ddd3);
					if(inner[3]=="")	hidingElemen(ddd4);
				}
				
				var canvjawab = document.createElement('canvas');
				document.body.appendChild(canvjawab);
				canvjawab.width = 300;
				canvjawab.height = 1010; // kalau 1000 ada 2 baris yang bisa nyelip di kertas jawaban
				ctxjawab = canvjawab.getContext("2d");
				//ctxjawab.fillStyle = '#D3D3D3';
				ctxjawab.fillStyle = '#ffffff';
				ctxjawab.fillRect(0, 0, canvjawab.width, canvjawab.height);
				ctxjawab.fillStyle = '#000000';
				ctxjawab.textAlign = "left";
				ctxjawab.font = "16px Arial";
				ctxjawab.fillText("Kunci Jawaban : ",0,20);
				for(var i=0;i<20;i++){
					if(i<arJawab.length){
						ctxjawab.fillText((i+1)+". "+arJawab[i],0,40+20*i);
					}
				}
				
				
				function funcPrint(){
					// klik dan save to pdf atau print langsung
					nonAktifElemen(buttonCetak); // non aktif tombol
					nonAktifElemen(buttonUlang); // non aktif tombol
					hidingElemen(buttonCetak); // hide sebelum print
					hidingElemen(buttonUlang); // hide sebelum print
					print();
				}
				function funcUlang(){
					// F5
					window.parent.location.href="PackageES.html";
				}
			}
			function hidingElemen(elem){
				//hiding elemen
				elem.setAttribute("hidden", "hidden");
			}
			function nonAktifElemen(elem){
				//non aktif elemen
				elem.disabled = true;
			}
		</script>
	</body>
</html>
