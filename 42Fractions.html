					var m0 = m;
					var m0b = m0;
					var ct = 0;
					do{
						m0b = m0;
						m0-=n;
						ct++;
					}while(m0>=0);
					
					var sisa = Math.abs(m0b);

					min = ar[0];
					max = ar[0];
					for(var i=0;i<ar.length;i++){
						min = Math.min(min,ar[i]);
						max = Math.max(max,ar[i]);
					}
					
					var iter = 0;
					var fpb = 1;
					var f = [];
					do {
						iter++;
						ff = 1;
						for(var i=0;i<ar.length;i++){
							f[i] = Mods(ar[i],iter)==0;
							ff *= f[i];
						}
						
						if (ff){
							fpb = iter;
						}
						fakhir = iter==max;
					}while (!fakhir);
					
					return fpb;

				function GambarBilanganPecahan5awal(nmcanvas,Ar){
					const canvas = document.getElementById(nmcanvas);
					const ctx = canvas.getContext("2d");
					ctx.lineWidth = 2;
					ctx.beginPath();
					ctx.fillStyle = "white";
					ctx.strokeStyle = "black";
					ctx.fillRect(0, 0, 400, 200);
					
					ctx.moveTo(0, 0);
					ctx.lineTo(0, 200);
					ctx.lineTo(400, 200);
					ctx.lineTo(400, 0);
					ctx.lineTo(0, 0);
					var dx = 400/Ar[1][1];
					var dy = 200/Ar[1][0];
					for(var i=0;i<Ar[1][1];i++){
						ctx.moveTo(i*dx, 0);
						ctx.lineTo(i*dx, 200);
					}
					for(var i=0;i<Ar[1][0];i++){
						ctx.moveTo(0, i*dy);
						ctx.lineTo(400, i*dy);
					}
					var ct = 0;
					var xct = 0;
					var yct = 0;
					do{
						ctx.fillStyle = "yellow";
						ctx.fillRect(xct*dx, yct*dy, dx, dy);
						xct++;
						if(xct==Ar[1][1]){
							xct=0;
							yct++;
						}
						ct++
					}while(ct<Ar[1][2])
					ctx.stroke();
					
					return 0;
				}

				function StringRibuan(str){
					var strfix = "";
					var arfix = new Array();
					var StrArray = SplitString(str);
					var i;
					
					for (var i=0; i<StrArray.length; i++){
						arfix.push(StrArray[i]);
					}
					
					var ct = 0;
					var m = 0;
					var n = 0;
					var ctmax = StrArray.length;
					var arct = new Array();
					for (var i=StrArray.length-1; i>=0; i--){
						ct++;
						ctmax--;
						if(ct==3){
							ct = 0;
							m++;
							arct.push(3);
						}
					}
					var n = StrArray.length - 3*arct.length;
					
					
					var iter=-1;
					strfix="";
					for (var i=0; i<n; i++){
						iter++;
						strfix += arfix[iter];
					}
					if (n>0)
						strfix +=  ",";
					for (var i=0; i<m; i++){
						for (var j=0; j<3; j++){
							iter++;
							strfix += arfix[iter];
						}
						strfix += ",";
					}
					
					var leng = strfix.length;
					
					strfix = strfix.substr(0, leng-1);
					
					return strfix
				}
