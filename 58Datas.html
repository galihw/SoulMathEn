				function RandomMyArray(Arr){
					/* ---- RANDOM isi Array ---- */
					/* Global */
					for (var i=0; i<Arr.length; i++){
						var r = Math.floor(Math.random() * Arr.length);
						var a = Arr[i];
						Arr[i] = Arr[r];
						Arr[r] = a;
					}
					return Arr

				function RandomAngkaAtoB(a,b){   
					var r = a+Math.ceil(Math.random() * b);

				function Mods(m,n){
					var m0 = m;
					var m0b = m0;
					var ct = 0;
					do{
						m0b = m0;
						m0-=n;
						ct++;
					}while(m0>=0);
					
					var sisa = Math.abs(m0b);
					return sisa;
				}
				function CariFPB(ar){
					//https://www.ketutrare.com/2019/05/contoh-aplikasi-fpb-dan-kpk-menggunakan-bahasa-c.html
					
					var min = ar[0];
					var max = ar[0];
					for(var i=0;i<ar.length;i++){
						min = Math.min(min,ar[i]);
						max = Math.max(max,ar[i]);
					}
					
					var iter = 0;
					var fpb = 1;
					var f = [];
					do {
						iter++;
						ff = 1;
						for(var i=0;i<ar.length;i++){
							f[i] = Mods(ar[i],iter)==0;
							ff *= f[i];
						}
						
						if (ff){
							fpb = iter;
						}
						fakhir = iter==max;
					}while (!fakhir);
					
					return fpb;
				}

				function StringRibuan(str){
					var strfix = "";
					var arfix = new Array();
					var StrArray = SplitString(str);
					for (var i=0; i<StrArray.length; i++){
						arfix.push(StrArray[i]);
					}
					
					var ct = 0;
					var m = 0;
					var n = 0;
					var ctmax = StrArray.length;
					var arct = new Array();
					for (var i=StrArray.length-1; i>=0; i--){
						ct++;
						ctmax--;
						if(ct==3){
							ct = 0;
							m++;
							arct.push(3);
						}
					}
					var n = StrArray.length - 3*arct.length;
					
					var iter=-1;
					strfix="";
					for (var i=0; i<n; i++){
						iter++;
						strfix += arfix[iter];
					}
					if (n>0)
						strfix +=  ".";
					for (var i=0; i<m; i++){
						for (var j=0; j<3; j++){
							iter++;
							strfix += arfix[iter];
						}
						strfix += ".";
					}
					
					var leng = strfix.length;
					strfix = strfix.substr(0, leng-1);
					return strfix
				}

				function GambarData7Data(nmcanvas,Arr){
					const canvas = document.getElementById(nmcanvas);
					const ctx = canvas.getContext("2d");
					//console.log(Arr)
				
					ctx.lineWidth = 2;
					ctx.fillStyle = "white";
					ctx.globalAlpha = 1.00;
					ctx.beginPath();
					ctx.moveTo(0,0);
					ctx.lineTo(0,120);
					ctx.lineTo(170,120);
					ctx.lineTo(170,0);
					ctx.lineTo(0,0);
					ctx.closePath();
					ctx.fill();
					ctx.strokeStyle = "#000000";
					ctx.stroke(); 
					
					ctx.font = "16px arial";
					ctx.textAlign = "center";
					ctx.fillStyle = "black";
					var iter = 0;
					var xx = 20;
					var yy = 20;
					for(var i=0;i<5;i++){
						yy = 20 + 20*i;
						for(var j=0;j<5;j++){
							xx = 20 + 30*j;
							ctx.fillText(Arr[iter],xx,yy);
							iter++;
						}
					}
					
				}
