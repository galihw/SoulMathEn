				function Mods(m,n){
					var m0b = m;
					var m0 = m;
					var ct = 0;
					do{
						m0b = m0;

				function CariFPB(ar){
					//https://www.ketutrare.com/2019/05/contoh-aplikasi-fpb-dan-kpk-menggunakan-bahasa-c.html
					var min = 0;
					var max = 0;
					for(var i=0;i<ar.length;i++){
						min = Math.min(min,ar[i]);
						max = Math.max(max,ar[i]);
					}
					var iter = 0;
					var fpb = 1;
					var f = [];
					do {
						iter++;
						var ff = 1;
						for(var i=0;i<ar.length;i++){
							f[i] = Mods(ar[i],iter)==0;
							ff *= f[i];
						}
						if (ff){
							fpb = iter;
						}
						var fakhir = iter==max;
					}while (!fakhir);
					return fpb;
				}
