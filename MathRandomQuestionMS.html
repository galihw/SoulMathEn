			body {

			.splitright {
				height: 100%;
				width: 70%;
				position: fixed;
				z-index: 1;
				top: 0;
				overflow-x: hidden;
				padding-top: 20px;
			}
			.split {
				height: 100%;
				width: 30%;
				position: fixed;
				z-index: 1;
				top: 0;
				overflow-x: hidden;
				padding-top: 20px;
			}
			.left {
				left: 0;

			}
			.right {
				right: 0;
				background-color: white;
				font-family: Arial;
				color: black;
			}
			.centered {
				position: absolute;
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
				text-align: center;
			}
			
			.top {
				position: absolute;
				top: 0%;
				left: 50%;
				transform: translate(-50%, -0%);
				text-align: center;
			}
			.topleft {
				position: absolute;
				top: 0px;
				left: 10px;
				text-align: left;
			}
			
			
			
			.expand-btn {
				background-color: #003049;
				border: none;
				color: #e3d5ca;
				cursor: pointer;
				font-size: 1rem;
				padding: 1rem;
				text-align: left;
				transition: 0.5s;
				width: 100px;
				height: 40px;
			}
			.expand-btnno {
				background-color: #003049;
				border: none;
				color: #e3d5ca;
				cursor: pointer;
				font-size: 1rem;
				padding: 1rem;
				text-align: left;
				transition: 0.5s;
				width: 100px;
				height: 40px;
			}
			.expand-btnno:hover,
			.active {
				background-color: #e3d5ca;
				color: #003049;
			}
			.expand-btn:hover,
			.active {
				background-color: #e3d5ca;
				color: #003049;
			}
			.expand-btn:after {
				color: #e3d5ca;
				content: "+";
				float: right;
				font-weight: bold;
				transition: 0.1s;
			}
			.expand-btnno:after {
				color: #e3d5ca;
				content: "+";
				float: right;
				font-weight: bold;
				transition: 0.1s;
			}
			.expand-btn:hover:after {
				color: #003049;
				transition: 0.5s;
			}
			.expand-btnno:hover:after {
				color: #003049;
				transition: 0.5s;
			}
			.active:after {
				content: "-";
				color: #003049;
			}
			article {
				color: #e3d5ca;
				max-height: 0;
				max-width: 50vw;
				overflow: hidden;
				padding: 0 1rem;
				transition: max-height 0.5s ease-in-out;
			}
			.model {
				text-align: left;
				width: 50;
				height: 20px;
				color: #000;
			}

			function RandomMyArray(Arr){
				/* ---- RANDOM isi Array ---- */
				/* Global */
				for (var i=0; i<Arr.length; i++){
					var r = Math.floor(Math.random() * Arr.length);
					var a = Arr[i];
					Arr[i] = Arr[r];
					Arr[r] = a;
				}
				return Arr
			}
			function RandomAngkaAtoB(a,b){   
				var r = a+Math.ceil(Math.random() * b);
				return r;
			}
			function FuncRandom(no){
				ResetData();
				var artipe = [[].concat(artipe1),[].concat(artipe2),[].concat(artipe3),[].concat(artipe4)];
				var nmPrint = [[].concat(nmPrint1),[].concat(nmPrint2),[].concat(nmPrint3),[].concat(nmPrint4)];
				var artipeFix = artipe[no-7];
				var nmPrintFix = nmPrint[no-7];
				
				//for(var i=0;i<nmPrintFix.length;i++){console.log(nmPrintFix[i].name);}
				
				for(var i=0;i<artipeFix.length;i++){
					artipeFix[i]=RandomMyArray(artipeFix[i]);
				}
				noTot = 0;
				var arTot = [];
				var nPrint;
				var namaPrint;
				var noInBab;
				
				do{
					noTot++;
					nPrint = RandomAngkaAtoB(-1,nmPrintFix.length);
					namaPrint = nmPrintFix[nPrint];
					noInBab = artipeFix[nPrint].shift();
					arTot.push([namaPrint,noInBab]);
					
				}while(noTot<20);
				
				// untuk cek data 20 soal
				/*
				for(var i=1;i<=noTot;i++){
					var keyName = arTot[i-1][0].name;
					var noName = arTot[i-1][1];
					console.log(keyName+" "+noName);
				}
				*/
				
				for(var i=1;i<=noTot;i++){
					ArrAmbil.push({bab:arTot[i-1][0],no:arTot[i-1][1]});
					var keyName = arTot[i-1][0];
					keyName(arTot[i-1][1],"d"+i+"1","c"+i+"1","d"+i+"2","c"+i+"2","d"+i+"3","c"+i+"3","d"+i+"4",i);
				}
				
				document.getElementById("bPrint").disabled = false;
			}

				canvjawab.width = 300;
				canvjawab.height = 1010; // kalau 1000 ada 2 baris yang bisa nyelip di kertas jawaban
				ctxjawab = canvjawab.getContext("2d");
				//ctxjawab.fillStyle = '#D3D3D3';
				ctxjawab.fillStyle = '#ffffff';
				ctxjawab.fillRect(0, 0, canvjawab.width, canvjawab.height);
				ctxjawab.fillStyle = '#000000';
				ctxjawab.textAlign = "left";
				ctxjawab.font = "16px Arial";
				ctxjawab.fillText("Answer key : ",0,20);
				for(var i=0;i<20;i++){
					if(i<arJawab.length){
						ctxjawab.fillText((i+1)+". "+arJawab[i],0,40+20*i);
					}
				}
				
				
				function funcPrint(){
					// klik dan save to pdf atau print langsung
					nonAktifElemen(buttonCetak); // non aktif tombol
					nonAktifElemen(buttonUlang); // non aktif tombol
					hidingElemen(buttonCetak); // hide sebelum print
					hidingElemen(buttonUlang); // hide sebelum print
					print();
				}
				function funcUlang(){
					// F5
					window.parent.location.href="MathRandomQuestionMS.html";
				}
			}
			function hidingElemen(elem){
				//hiding elemen
				elem.setAttribute("hidden", "hidden");
			}
			function nonAktifElemen(elem){
				//non aktif elemen
				elem.disabled = true;
			}
		</script>
